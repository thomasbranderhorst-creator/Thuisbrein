<script>
const vragen = [
  {
    id: "eigendom",
    vraag: "Wat is jouw situatie?",
    multi: false,
    opties: [

      { label: "Ik heb al zonnepanelen maar geen slimme sturing", value: 4, icon: "☀️" },

  },

    multi: false,

      { label: "Nee", value: 0, icon: "✗" },
    ]
  },
  {
    id: "verwarming",
    vraag: "Hoe verwarm je je woning?",
    sub: "Meerdere antwoorden mogelijk",
    multi: true,
    opties: [
      { label: "CV-ketel (gas)", value: "cv", score: 0, icon: "🔥" },
      { label: "(Hybride) warmtepomp", value: "wp", score: 2, icon: "♨️" },
      { label: "Volledig elektrische warmtepomp", value: "wp_el", score: 2, icon: "♨️" },
      { label: "Bodemwarmtepomp (WKO)", value: "bodem", score: 2, icon: "🌍" },
      { label: "Stadsverwarming / blokverwarming", value: "stadsverw", score: 1, icon: "🏙️" },
      { label: "Airco (ook als verwarming)", value: "airco_verw", score: 2, icon: "❄️" },
      { label: "Anders, namelijk…", value: "anders", score: 1, icon: "✏️", freetext: true },
    ]
  },
  {
    id: "airco",
    vraag: "Heb je een airco?",
    multi: false,
    opties: [
      { label: "Ja, meerdere units", value: 2, icon: "❄️" },
      { label: "Ja, één unit", value: 1, icon: "❄️" },
      { label: "Nee", value: 0, icon: "✗" },
    ]
  },
  {
    id: "laadpaal",
    vraag: "Laadpaal of elektrische auto?",
    multi: false,
    opties: [
      { label: "Ja, laadpaal aanwezig", value: 2, icon: "⚡" },
      { label: "EV, nog geen paal", value: 1, icon: "🚗" },
      { label: "Nee", value: 0, icon: "✗" },
    ]
  }
];

const TOTAAL = vragen.length;
let stap = 0; // 0=intro, 1..N=vragen, N+1=resultaat
let antwoorden = {};
let geselecteerd = null; // single: number|string, multi: array
let andersText = "";

function verwarmingScore(sel) {
  const v = vragen.find(v => v.id === "verwarming");
  let s = sel.reduce((acc, val) => {
    const opt = v.opties.find(o => o.value === val || (o.freetext && val.startsWith("anders:")));
    return acc + (opt ? opt.score : 1);
  }, 0);
  return Math.min(s, 2);
}

function berekenScore() {
  let s = 0;
  Object.entries(antwoorden).forEach(([k, v]) => {
    if (k === "eigendom" || k === "verwarming") return;
    if (typeof v === "number") s += v;
  });
  if (Array.isArray(antwoorden.verwarming)) s += verwarmingScore(antwoorden.verwarming);
  return s;
}

function getUitkomst() {
  const score = berekenScore();
  const eig = antwoorden.eigendom;
  if (eig === -1) return {
    kleur: "grijs", dot: "#666", label: "Helaas",
    titel: "Huurwoningen doen we niet.",
    tekst: "Voor installaties heb ik toestemming van de eigenaar nodig. Huur je van een woningcorporatie of particuliere verhuurder die wil verduurzamen? Stuur ze gerust mijn kant op.",
    actie: "mail", actieTekst: "Toch contact opnemen"
  };
  // Al panelen maar geen sturing → directe groene lead
  if (eig === 4) return {
    kleur: "groen", dot: "#3B6D11", label: "Directe match",
    titel: "Saldering stopt — jij hebt nu actie nodig.",
    tekst: "Vanaf 2027 levert terugleveren veel minder op. ThuisBrein zorgt dat jouw zonnestroom zoveel mogelijk in huis blijft — automatisch. Geen dure batterij noodzakelijk, al helpt het wel. Een kennismaking duurt een uur.",
    actie: "whatsapp", actieTekst: "Plan een kennismaking via WhatsApp"
  };
  if (eig === 3) return {
    kleur: "groen", dot: "#3B6D11", label: "Interessante lead",
    titel: "Verhuurders zijn juist een mooie markt.",
    tekst: "Verduurzaming van huurwoningen wordt steeds relevanter — voor energielabels, huurwaarde en wetgeving. Ik doe dit graag op maat voor één woning of een heel portfolio. Laten we even bellen.",
    actie: "whatsapp", actieTekst: "Plan een gesprek via WhatsApp"
  };

  const verwKeys = Array.isArray(antwoorden.verwarming) ? antwoorden.verwarming : [];
  const alleenCV = verwKeys.length === 1 && verwKeys[0] === "cv"
    && antwoorden.panelen === 0 && antwoorden.batterij === 0
    && antwoorden.airco === 0 && antwoorden.laadpaal === 0;

  if (alleenCV) return {
    kleur: "grijs", dot: "#666", label: "Nog niet",
    titel: "Nog niet het moment — maar dat verandert.",
    tekst: "Met alleen een CV-ketel is er nu te weinig om op aan te sluiten. Maar als je ooit zonnepanelen, een warmtepomp of een laadpaal overweegt, is ThuisBrein precies wat je nodig hebt. Laat je e-mail achter en ik houd je op de hoogte.",
    actie: "mail", actieTekst: "Houd me op de hoogte"
  };

  if (verwKeys.includes("stadsverw") && score < 4) return {
    kleur: "oranje", dot: "#C07020", label: "Potentieel",
    titel: "Stadsverwarming — even nader bekijken.",
    tekst: "Stadsverwarming is niet altijd koppelbaar via Home Assistant. Maar als je ook zonnepanelen, een laadpaal of airco hebt, valt er zeker iets te doen. Laten we even bellen.",
    actie: "whatsapp", actieTekst: "Neem contact op"
  };

  if (score >= 6) return {
    kleur: "groen", dot: "#3B6D11", label: "Goede match",
    titel: "Jouw woning is klaar voor ThuisBrein.",
    tekst: "Je hebt meerdere systemen die nu langs elkaar werken. Precies wat ThuisBrein oplost. Een kennismaking duurt een uur — daarna weet je wat er mogelijk is en wat het kost.",
    actie: "whatsapp", actieTekst: "Plan een kennismaking via WhatsApp"
  };

  if (score >= 3) return {
    kleur: "oranje", dot: "#C07020", label: "Potentieel",
    titel: "Goede basis — er valt al iets te doen.",
    tekst: "Je hebt een of twee systemen die al slim aangestuurd kunnen worden. En als je later uitbreidt groeit ThuisBrein gewoon mee. Laten we alvast kennismaken.",
    actie: "whatsapp", actieTekst: "Neem contact op"
  };

  return {
    kleur: "oranje", dot: "#C07020", label: "Potentieel",
    titel: "Kleine basis, maar een begin is er.",
    tekst: "Er is nu beperkt wat we kunnen koppelen, maar je bent op de goede weg. Een korte kennismaking laat zien welke stap als eerste de meeste winst oplevert.",
    actie: "whatsapp", actieTekst: "Neem contact op"
  };
}

function verwLabelTekst(ant) {
  if (!Array.isArray(ant) || ant.length === 0) return "—";
  const v = vragen.find(v => v.id === "verwarming");
  return ant.map(val => {
    if (val.startsWith("anders:")) return "Anders: " + val.slice(7);
    return v.opties.find(o => o.value === val)?.label ?? val;
  }).join(", ");
}

function render() {
  const el = document.getElementById("wizard");

  if (stap === 0) {
    el.innerHTML = `
      <span class="tag">ThuisBrein Check</span>
      <h1>Past ThuisBrein<br><em>bij jouw woning?</em></h1>
      <p class="sub">Enkele korte vragen. Geen typwerk. Je weet in één minuut of ik iets voor je kan betekenen — en wat de volgende stap is.</p>
      <button class="btn-primary" onclick="startWizard()">Start de check →</button>
      <p class="btn-no-reg">Geen registratie nodig</p>`;
    return;
  }

  if (stap === TOTAAL + 1) {
    const u = getUitkomst();
    const bgMap = { groen: "#EAF3DE", oranje: "#FEF3E2", grijs: "#F0F0F0" };
    const borderMap = { groen: "#639922", oranje: "#E8A030", grijs: "#AAAAAA" };

    const samenv = vragen.filter(v => antwoorden[v.id] !== undefined && v.id !== "eigendom").map(v => {
      const ant = antwoorden[v.id];
      const label = v.multi ? verwLabelTekst(ant) : (v.opties.find(o => o.value === ant)?.label ?? "—");
      const icon = v.multi ? "🏠" : (v.opties.find(o => o.value === ant)?.icon ?? "");
      return `<div class="result-row"><span>${v.vraag}</span><span>${icon} ${label}</span></div>`;
    }).join("");

    const actiBtn = u.actie === "whatsapp"
      ? `<a href="https://wa.me/31654157920?text=Hallo%2C%20ik%20heb%20de%20ThuisBrein%20Check%20gedaan%20en%20wil%20graag%20kennismaken." target="_blank" class="btn-whatsapp">💬 ${u.actieTekst}</a>`
      : `<a href="mailto:thomasbranderhorst@gmail.com?subject=ThuisBrein%20updates" class="btn-mail">✉️ ${u.actieTekst}</a>`;

    el.innerHTML = `
      <div class="result-dot-row">
        <div class="result-dot" style="background:${u.dot}"></div>
        <span class="result-label" style="color:${u.dot}">${u.label}</span>
      </div>
      <h2 style="margin-bottom:1rem">${u.titel}</h2>
      <p class="sub">${u.tekst}</p>
      ${antwoorden.eigendom !== -1 && antwoorden.eigendom !== 3 ? `
      <div class="result-samenvatting" style="background:${bgMap[u.kleur]};border:1px solid ${borderMap[u.kleur]}">
        <p class="result-samenvatting-title">Jouw situatie</p>
        ${samenv}
      </div>` : ""}
      ${actiBtn}
      <button class="btn-ghost" onclick="herstart()">Opnieuw doen</button>`;
    return;
  }

  const vraag = vragen[stap - 1];
  // Bereken effectieve stapnummer (eigendom telt mee maar verhuurder/huurder sloeg stappen over)
  const voortgang = Math.round((stap / TOTAAL) * 100);

  const optiesHtml = vraag.opties.map(opt => {
    const isActief = vraag.multi
      ? (Array.isArray(geselecteerd) && geselecteerd.includes(opt.value))
      : geselecteerd === opt.value;
    const indicator = vraag.multi
      ? `<span class="checkbox">${isActief ? "✓" : ""}</span>`
      : `<span class="optie-check">${isActief ? "✓" : ""}</span>`;
    const andersInput = opt.freetext && Array.isArray(geselecteerd) && geselecteerd.includes("anders")
      ? `<br><input class="anders-input" type="text" placeholder="Wat voor verwarming heb je?" value="${andersText}" oninput="andersText=this.value" autofocus>`
      : "";
    return `
      <button class="optie${isActief ? " actief" : ""}" onclick="kiesOptie('${opt.value}', ${opt.freetext || false})">
        <span class="optie-icon">${opt.icon}</span>
        <span class="optie-label">${opt.label}</span>
        ${indicator}
      </button>${andersInput}`;
  }).join("");

  const kanVolgende = vraag.multi
    ? (Array.isArray(geselecteerd) && geselecteerd.length > 0)
    : geselecteerd !== null;

  el.innerHTML = `
    <div class="progress-row"><span>Vraag ${stap} van ${TOTAAL}</span><span>${voortgang}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${voortgang}%"></div></div>
    <h2>${vraag.vraag}</h2>
    ${vraag.sub ? `<p class="multi-hint">✓ ${vraag.sub}</p>` : ""}
    <div class="opties">${optiesHtml}</div>
    <button class="btn-primary" onclick="volgende()" ${kanVolgende ? "" : "disabled"}>
      ${stap === TOTAAL ? "Bekijk resultaat →" : "Volgende →"}
    </button>
    ${stap > 1 ? `<button class="btn-back" onclick="terug()">← Terug</button>` : ""}`;
}

function kiesOptie(val, isFreetext) {
  const vraag = vragen[stap - 1];
  // Converteer val terug naar juiste type
  const numVal = Number(val);
  const eigenVal = isNaN(numVal) ? val : numVal;

  if (vraag.multi) {
    if (!Array.isArray(geselecteerd)) geselecteerd = [];
    if (geselecteerd.includes(eigenVal)) {
      geselecteerd = geselecteerd.filter(v => v !== eigenVal);
    } else {
      geselecteerd = [...geselecteerd, eigenVal];
    }
  } else {
    geselecteerd = eigenVal;
  }
  render();
}

function volgende() {
  const vraag = vragen[stap - 1];
  if (vraag.multi) {
    if (!Array.isArray(geselecteerd) || geselecteerd.length === 0) return;
    const opgeslagen = geselecteerd.map(v => v === "anders" && andersText.trim() ? `anders:${andersText.trim()}` : v);
    antwoorden[vraag.id] = opgeslagen;
  } else {
    if (geselecteerd === null) return;
    antwoorden[vraag.id] = geselecteerd;
    // Huurder, verhuurder of al-panelen → direct naar resultaat
    if (vraag.id === "eigendom" && (geselecteerd === -1 || geselecteerd === 3 || geselecteerd === 4)) {
      geselecteerd = null;
      stap = TOTAAL + 1;
      render();
      return;
    }
  }
  geselecteerd = null;
  andersText = "";
  stap++;
  render();
}

function terug() {
  stap--;
  const vraag = vragen[stap - 1];
  const prev = antwoorden[vraag.id];
  geselecteerd = vraag.multi
    ? (Array.isArray(prev) ? prev.map(v => v.startsWith("anders:") ? "anders" : v) : [])
    : (prev !== undefined ? prev : null);
  render();
}

function startWizard() { stap = 1; geselecteerd = null; render(); }
function herstart() { stap = 0; antwoorden = {}; geselecteerd = null; andersText = ""; render(); }

render();
</script>
