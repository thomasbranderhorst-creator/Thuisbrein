<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Control — Thomas</title>
<style>
body{margin:0;min-height:100vh;background:#0F1E33;color:#E8B23A;font-family:'Space Grotesk',system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
#boot{animation:fade 1.2s ease-in-out infinite alternate}
@keyframes fade{from{opacity:.4}to{opacity:1}}
.err{color:#D98E5F;animation:none;max-width:320px;text-align:center;line-height:1.5;font-size:14px}
</style>
</head>
<body>
<div id="boot">Mission Control laden…</div>
<script>
/* Loader: haalt de app live op uit Supabase (mc_assets.app).
   Wijzigingen in mc_assets zijn direct live — geen GitHub-push meer nodig. */
(async () => {
  const SB_URL = "https://wlzhaztvzsssbkvsftim.supabase.co";
  const SB_KEY = "sb_publishable_VQIJGkx_bSmvNpphSOyXsw_f5RpzZfH";
  try {
    const r = await fetch(SB_URL + "/rest/v1/mc_assets?id=eq.app&select=html", {
      headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY }
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const rows = await r.json();
    if (!rows.length || !rows[0].html) throw new Error("geen app-inhoud");
    document.open();
    document.write(rows[0].html);
    document.close();
  } catch (e) {
    const b = document.getElementById("boot");
    b.className = "err";
    b.textContent = "Laden mislukt (" + e.message + "). Check je verbinding en ververs de pagina.";
  }
})();
</script>
</body>
</html>
